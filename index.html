<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monday.com Creative Dashboard</title>
  <style>
    :root {
      --brand: #ff3d57;
      --brand-dark: #c0392b;
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #242440;
      --border: #2e2e50;
      --text: #e8e8f0;
      --muted: #8888aa;
      --success: #00c875;
      --warning: #fdab3d;
      --info: #579bfc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 36px; height: 36px;
      background: var(--brand);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 18px; color: #fff; flex-shrink: 0;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header p  { font-size: 13px; color: var(--muted); }
    .version-badge {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .field { margin-bottom: 16px; }
    label  { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    input, select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, select:focus { border-color: var(--info); }
    select option { background: var(--surface2); }

    .row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .row .field { flex: 1; min-width: 200px; margin-bottom: 0; }

    button {
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
      white-space: nowrap;
    }
    button:hover  { background: var(--brand-dark); }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .5; cursor: default; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-ghost:hover { background: var(--surface2); }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
    .stat {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }
    .stat .number { font-size: 40px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
    .stat .label  { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }
    .stat.outstanding .number { color: var(--warning); }
    .stat.done        .number { color: var(--success); }
    .stat.total       .number { color: var(--info); }

    /* Search bar */
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-wrap input { padding-left: 36px; }
    .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 14px; pointer-events: none;
    }
    .board-count { font-size: 12px; color: var(--muted); margin-bottom: 12px; }

    .board-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      margin-bottom: 8px;
      gap: 12px;
    }
    .board-name { font-size: 14px; font-weight: 500; }
    .board-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .badge {
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .badge-warning { background: rgba(253,171,61,.15); color: var(--warning); }
    .badge-success { background: rgba(0,200,117,.15); color: var(--success); }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--info);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .alert-error { background: rgba(255,61,87,.1); border: 1px solid rgba(255,61,87,.3); color: #ff8fa0; }
    .alert-info  { background: rgba(87,155,252,.1); border: 1px solid rgba(87,155,252,.3); color: var(--info); }

    .refresh-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }
    .last-updated { font-size: 12px; color: var(--muted); }

    .token-wrap { position: relative; }
    .token-wrap input { padding-right: 44px; font-family: monospace; font-size: 13px; }
    .toggle-eye {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer;
      padding: 4px; font-size: 16px; line-height: 1;
    }
    .toggle-eye:hover { color: var(--text); background: none; transform: translateY(-50%); }

    .progress-wrap { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 8px; }
    .progress-bar  { height: 100%; border-radius: 3px; background: var(--success); transition: width .5s ease; }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      main   { padding: 16px; }
      .card  { padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">M</div>
  <div>
    <h1>Creative Dashboard</h1>
    <p>monday.com · Outstanding Projects</p>
  </div>
  <div class="version-badge">v1.01</div>
</header>

<main>

  <div class="card">
    <div class="card-title">Configuration</div>
    <div id="alert-area"></div>

    <div class="field">
      <label for="token-input">API Token</label>
      <div class="token-wrap">
        <input type="password" id="token-input" placeholder="eyJhbGci…" autocomplete="off" />
        <button class="toggle-eye" onclick="toggleEye()" title="Show/hide token">👁</button>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="done-keywords">"Done" status keywords <span style="color:var(--muted);font-weight:400;">(comma-separated)</span></label>
        <input type="text" id="done-keywords" value="done, completed, closed, cancelled" />
      </div>
      <button onclick="loadBoards()" id="load-btn">Load Boards</button>
    </div>
  </div>

  <div id="results" style="display:none;">

    <div class="card">
      <div class="refresh-row">
        <div class="card-title" style="margin-bottom:0;">Summary</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="last-updated" id="last-updated"></span>
          <button class="btn-ghost" onclick="loadBoards()" style="padding:6px 14px;font-size:13px;">↻ Refresh</button>
        </div>
      </div>
      <div class="stats" id="stats"></div>
    </div>

    <div class="card">
      <div class="card-title">Boards</div>

      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Filter boards by name…" oninput="renderBoards()" />
      </div>

      <div class="board-count" id="board-count"></div>
      <div id="board-list"></div>
    </div>

  </div>

  <div id="loading-area"></div>

</main>

<script>
const API = 'https://api.monday.com/v2';
const $ = id => document.getElementById(id);

let allBoardResults = [];

function showAlert(msg, type = 'error') {
  $('alert-area').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}
function clearAlert() { $('alert-area').innerHTML = ''; }

function setLoading(msg) {
  $('loading-area').innerHTML = msg
    ? `<div class="status-bar"><div class="spinner"></div><span>${msg}</span></div>`
    : '';
}

function toggleEye() {
  const inp = $('token-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

async function gql(query, token) {
  const res = await fetch(API, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': token,
    },
    body: JSON.stringify({ query }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
  const json = await res.json();
  if (json.errors?.length) throw new Error(json.errors.map(e => e.message).join('; '));
  return json.data;
}

async function loadBoards() {
  const token = $('token-input').value.trim();
  if (!token) { showAlert('Please enter your API token first.'); return; }
  clearAlert();
  $('load-btn').disabled = true;
  $('results').style.display = 'none';
  setLoading('Loading boards…');

  try {
    const boardData = await gql(`{
      boards(limit: 100, state: active) {
        id
        name
      }
    }`, token);

    const boards = boardData.boards || [];
    if (boards.length === 0) {
      showAlert('No active boards found in your account.', 'info');
      setLoading('');
      return;
    }

    const doneKeywords = $('done-keywords').value
      .split(',').map(s => s.trim().toLowerCase()).filter(Boolean);

    const boardIds = boards.map(b => b.id).join(',');
    setLoading(`Loading items from ${boards.length} board(s)…`);

    const itemData = await gql(`{
      boards(ids: [${boardIds}], limit: 100) {
        id
        items_page(limit: 500) {
          items {
            id
            column_values(types: [status]) {
              text
            }
          }
        }
      }
    }`, token);

    const boardMap = {};
    (itemData.boards || []).forEach(b => { boardMap[b.id] = b; });

    allBoardResults = boards.map(b => {
      const live  = boardMap[b.id];
      const items = live?.items_page?.items || [];
      let done = 0;
      items.forEach(item => {
        const isDone = item.column_values.some(cv =>
          doneKeywords.some(kw => cv.text?.toLowerCase().includes(kw))
        );
        if (isDone) done++;
      });
      const total       = items.length;
      const outstanding = total - done;
      return { ...b, total, done, outstanding };
    });

    updateStats(allBoardResults);
    renderBoards();

    $('last-updated').textContent = `Updated ${new Date().toLocaleTimeString()}`;
    $('results').style.display = 'block';
    setLoading('');
  } catch (e) {
    showAlert(`Error fetching data: ${e.message}`);
    setLoading('');
  } finally {
    $('load-btn').disabled = false;
  }
}

function updateStats(boards) {
  const totalBoards      = boards.length;
  const totalItems       = boards.reduce((s, b) => s + b.total, 0);
  const totalOutstanding = boards.reduce((s, b) => s + b.outstanding, 0);
  const totalDone        = boards.reduce((s, b) => s + b.done, 0);

  $('stats').innerHTML = `
    <div class="stat total">
      <div class="number">${totalBoards}</div>
      <div class="label">Boards</div>
    </div>
    <div class="stat total">
      <div class="number">${totalItems}</div>
      <div class="label">Total Items</div>
    </div>
    <div class="stat outstanding">
      <div class="number">${totalOutstanding}</div>
      <div class="label">Outstanding</div>
    </div>
    <div class="stat done">
      <div class="number">${totalDone}</div>
      <div class="label">Done</div>
    </div>
  `;
}

function renderBoards() {
  const query   = $('search-input').value.trim().toLowerCase();
  const visible = query
    ? allBoardResults.filter(b => b.name.toLowerCase().includes(query))
    : allBoardResults;

  $('board-count').textContent =
    query ? `Showing ${visible.length} of ${allBoardResults.length} boards` : `${allBoardResults.length} boards`;

  if (visible.length === 0) {
    $('board-list').innerHTML = `<div style="text-align:center;padding:32px;color:var(--muted);font-size:14px;">No boards match your search.</div>`;
    return;
  }

  $('board-list').innerHTML = visible.map(b => {
    const bpct    = b.total > 0 ? Math.round(b.done / b.total * 100) : 0;
    const badgeCls = b.outstanding > 0 ? 'badge-warning' : 'badge-success';
    const badgeTxt = b.outstanding > 0 ? `${b.outstanding} outstanding` : 'All done ✓';
    return `
      <div class="board-item">
        <div style="flex:1;min-width:0;">
          <div class="board-name">${escHtml(b.name)}</div>
          <div class="board-meta">${b.done} / ${b.total} items done</div>
          <div class="progress-wrap">
            <div class="progress-bar" style="width:${bpct}%"></div>
          </div>
        </div>
        <span class="badge ${badgeCls}">${badgeTxt}</span>
      </div>
    `;
  }).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

$('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadBoards();
});
</script>
</body>
</html>
